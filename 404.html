<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090d17" />
    <meta name="description" content="CubeRub — понятное интерактивное решение кубика 2×2 и 3×3." />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>CubeRub — собери кубик понятно</title>
    <base href="./" />
    <script>
      // GitHub Pages serves this file as a custom 404. Forward the
      // user to the SPA index with the original path preserved in
      // sessionStorage so the client router can restore it.
      (() => {
        try {
          const path = location.pathname + location.search + location.hash;
          if (path !== "/" && path !== "/index.html") {
            sessionStorage.setItem("cuberub:pending-path", path);
          }
        } catch (_) { /* ignore */ }
        location.replace("./");
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
