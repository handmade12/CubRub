<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090d17" />
    <meta
      name="description"
      content="CubeRub — понятное интерактивное решение кубика 2×2 и 3×3."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>CubeRub — собери кубик понятно</title>
    <base href="./" />
    <script type="module" crossorigin src="./assets/index-FmwVssyT.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/preload-helper-BXl3LOEh.js">
    <link rel="stylesheet" crossorigin href="./assets/index-CCupF429.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      // GitHub Pages does not let us set headers on a static dist. Inline
      // a relaxed CSP here so the Preact bundle can render styles and run
      // the cubing.js worker without being blocked.
      // Production deployments are still served by the in-Deno server
      // (apps/web/main.ts) with the strict headers.
      (() => {
        const meta = document.createElement("meta");
        meta.httpEquiv = "Content-Security-Policy";
        meta.content = [
          "default-src 'self'",
          "script-src 'self' 'wasm-unsafe-eval'",
          "style-src 'self' 'unsafe-inline'",
          "img-src 'self' data:",
          "worker-src 'self' blob:",
          "connect-src 'self'",
          "object-src 'none'",
          "base-uri 'self'",
          "frame-ancestors 'none'",
        ].join("; ");
        document.head.appendChild(meta);
      })();
    </script>
  </body>
</html>
