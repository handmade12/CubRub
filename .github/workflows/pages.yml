name: build & publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: denoland/deno:alpine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Cache deno deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            .deno_cache
          key: cubrub-build-${{ runner.os }}-${{ hashFiles('**/deno.lock', '.github/workflows/pages.yml') }}
          restore-keys: |
            cubrub-build-${{ runner.os }}-

      - name: Install
        run: deno install

      - name: Format and lint
        run: deno fmt --check . && deno lint . && deno check

      - name: Build client
        run: deno task build

      - name: Run tests
        run: deno test --allow-read

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
