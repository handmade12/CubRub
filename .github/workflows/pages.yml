name: build & publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build
        run: npx --yes deno@v1.45.5 task build

      - name: Add .nojekyll
        run: touch apps/web/dist/.nojekyll

      - name: Inject Pages asset base
        run: node -e "const fs=require('fs');const p='apps/web/dist/index.html';let h=fs.readFileSync(p,'utf8');h=h.replace(/(src|href)=\"\/(?!\\/)/g,'$1=\"./');h=h.replace('<head>','<head><base href=\"./\">');fs.writeFileSync(p,h);"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
