name: build & publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: denoland/deno:alpine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Cache deno deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            .deno_cache
          key: cubrub-build-${{ runner.os }}-${{ hashFiles('**/deno.lock', '.github/workflows/pages.yml') }}
          restore-keys: |
            cubrub-build-${{ runner.os }}-

      - name: Install
        run: deno install

      - name: Format and lint
        run: deno fmt --check . && deno lint . && deno check

      - name: Build client
        run: deno task build

      - name: Run tests
        run: deno test --allow-read

      - name: Copy dist to workspace
        run: cp -R apps/web/dist /__w/CubRub/CubRub/pages-dist
