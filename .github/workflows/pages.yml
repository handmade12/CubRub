name: build & publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DENO_VERSION: "v1.45.5"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache deno deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            .deno_cache
          key: cubrub-build-${{ runner.os }}-${{ hashFiles('**/deno.lock', '.github/workflows/build.yml') }}
          restore-keys: |
            cubrub-build-${{ runner.os }}-

      - name: Format and lint
        run: deno task check

      - name: Run tests
        run: deno task test

      - name: Build client
        run: deno task build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
